[tasks.hook]
description = "Install git post-merge hook"
run = """
test -x .git/hooks/post-merge && diff -q setup/hooks/post-merge .git/hooks/post-merge >/dev/null \
  && echo "⏭️ already installed" \
  || { cp setup/hooks/post-merge .git/hooks/post-merge && chmod +x .git/hooks/post-merge && echo "✅ installed"; }
"""

[tasks.symlinks]
description = "Symlink dotfiles into ~/"
run = """
setup/manage-symlinks --dry-run >/dev/null 2>&1 \
  && echo "⏭️ already ok" \
  || { setup/manage-symlinks && echo "✅ set up"; }
"""

[tasks.crontab]
description = "Install crontab"
run = """
crontab -l 2>/dev/null | diff -q - crontab.txt >/dev/null \
  && echo "⏭️ already ok" \
  || { crontab crontab.txt && echo "✅ installed"; }
"""

[tasks.brew]
description = "Install brew packages"
run = """
brew bundle check --file setup/Brewfile.shared >/dev/null \
  && echo "⏭️ shared already ok" \
  || { echo "🔧 installing shared packages..." && brew bundle --file setup/Brewfile.shared && echo "✅ shared done"; }
[[ -n "$DOTKYL_HOST" ]] && {
  brew bundle check --file setup/Brewfile.$DOTKYL_HOST >/dev/null \
    && echo "⏭️ $DOTKYL_HOST already ok" \
    || { echo "🔧 installing $DOTKYL_HOST packages..." && brew bundle --file setup/Brewfile.$DOTKYL_HOST && echo "✅ $DOTKYL_HOST done"; }
}
"""

[tasks.private-repo]
description = "Clone private dotfiles repo"
run = """
test -d private/.git \
  && echo "⏭️ already cloned" \
  || { git clone git@github.com:katylava/dotkyl-private.git private && echo "✅ cloned"; }
"""

[tasks.check-host]
description = "Verify hostname is configured"
run = """
bin/get-host >/dev/null 2>&1 \
  || echo "👉 Add $(hostname) to bin/get-host and re-run mise run install"
"""

[tasks.sync]
description = "Fast tasks (run by post-merge hook)"
depends = ["hook", "symlinks", "crontab"]

[tasks.install]
description = "All tasks including brew"
depends = ["sync", "brew", "private-repo", "check-host"]
