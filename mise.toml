[settings]
task.timings = false

[tasks."setup:git-hook"]
description = "Install git hooks"
run = """
# ...
for hook in setup/hooks/*; do
  name=$(basename "$hook")
  if test -x ".git/hooks/$name" && diff -q "$hook" ".git/hooks/$name" >/dev/null; then
    echo "⏭️ $name already installed"
  else
    cp "$hook" ".git/hooks/$name" && chmod +x ".git/hooks/$name" && echo "✅ $name installed"
  fi
done
"""

[tasks."setup:symlinks"]
description = "Symlink dotfiles into ~/"
run = """
# ...
setup/bin/manage-symlinks --dry-run >/dev/null 2>&1 \
  && echo "⏭️ already ok" \
  || { setup/bin/manage-symlinks && echo "✅ set up"; }
"""

[tasks."setup:crontab"]
description = "Install crontab (shared + host-specific)"
run = """
# ...
host=$(bin/get-host 2>/dev/null)
combined=$(mktemp)
sed "s|\\$HOME|$HOME|g" crontab.txt > "$combined"
[[ -n "$host" && -f "crontab--${host}.txt" ]] && sed "s|\\$HOME|$HOME|g" "crontab--${host}.txt" >> "$combined"
crontab -l 2>/dev/null | diff -q - "$combined" >/dev/null \
  && echo "⏭️ already ok" \
  || { crontab "$combined" && echo "✅ installed"; }
rm -f "$combined"
"""

[tasks."install:brew"]
description = "Install brew packages"
shell = "zsh -c"
run = '''
source ./setup/bin/apply-manifest.zsh
install_file() { brew bundle --file "$1" }
apply_manifest Brewfile brew
'''

[tasks."setup:private-repo"]
description = "Clone or pull private dotfiles repo"
run = """
# ...
if test -d private/.git; then
  git -C private pull --quiet && echo "⏭️ private up to date"
else
  git clone git@github.com:katylava/dotkyl-private.git private && echo "✅ cloned"
fi
"""
[tasks."install:check-host"]
description = "Verify hostname is configured"
run = """
# ...
bin/get-host >/dev/null 2>&1 \
  || echo "👉 Add $(hostname) to bin/get-host and re-run mise run install"
"""

[tasks."sync:brew"]
description = "Remind if Brewfile changed since last brew install"
run = "setup/bin/check-marker Brewfile brew"

[tasks."install:pip"]
description = "Install pip packages"
shell = "zsh -c"
run = '''
source ./setup/bin/apply-manifest.zsh
install_file() { mise exec python -- pip install -q -r "$1" }
post_install() { mise reshim }
apply_manifest Pipfile pip
'''

[tasks."sync:pip"]
description = "Remind if Pipfile changed since last pip install"
run = "setup/bin/check-marker Pipfile pip"

[tasks."install:npm"]
description = "Install global npm packages"
shell = "zsh -c"
run = '''
source ./setup/bin/apply-manifest.zsh
check_line() { mise exec node -- npm ls -g --depth=0 "$1" >/dev/null 2>&1 }
install_line() {
  mise exec node -- npm install -g --silent "$@" \
    && for pkg in "$@"; do print -r -- "✅ npm $pkg installed"; done
}
post_install() { mise reshim }
apply_manifest NpmPackages npm
'''

[tasks."install:claude-plugins"]
description = "Install Claude Code plugins from ClaudePlugins file"
shell = "zsh -c"
run = '''
source ./setup/bin/apply-manifest.zsh
check_line() {
  # split a manifest line "<source> <plugin> <marketplace>" into fields:
  # the here-string (<<<) feeds "$1" to `read`, which splits on whitespace;
  # the trailing _ absorbs any extra fields.
  read -r source plugin marketplace _ <<<"$1"
  claude plugin list 2>/dev/null | ag " $plugin@$marketplace$" >/dev/null
}
install_line() {
  for line in "$@"; do
    read -r source plugin marketplace _ <<<"$line"
    claude plugin marketplace add "$source" >/dev/null 2>&1
    claude plugin install "$plugin@$marketplace" >/dev/null \
      && print -r -- "✅ plugin $plugin@$marketplace installed"
  done
}
apply_manifest ClaudePlugins claude-plugins
'''

[tasks."sync:claude-plugins"]
description = "Remind if ClaudePlugins changed since last claude-plugins install"
run = "setup/bin/check-marker ClaudePlugins claude-plugins"

[tasks."sync:npm"]
description = "Remind if NpmPackages changed since last npm install"
run = "setup/bin/check-marker NpmPackages npm"

[tasks.sync]
description = "Fast tasks (run by post-merge hook)"
depends = ["setup:**", "sync:**", "claude-settings-sync"]

[tasks.install]
description = "Full machine setup (run manually)"
depends = ["setup:**", "install:**"]
