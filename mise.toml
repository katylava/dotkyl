[settings]
task.timings = false

[tasks."setup:git-hook"]
description = "Install git hooks"
run = """
# ...
for hook in setup/hooks/*; do
  name=$(basename "$hook")
  if test -x ".git/hooks/$name" && diff -q "$hook" ".git/hooks/$name" >/dev/null; then
    echo "⏭️ $name already installed"
  else
    cp "$hook" ".git/hooks/$name" && chmod +x ".git/hooks/$name" && echo "✅ $name installed"
  fi
done
"""

[tasks."setup:symlinks"]
description = "Symlink dotfiles into ~/"
run = """
# ...
setup/manage-symlinks --dry-run >/dev/null 2>&1 \
  && echo "⏭️ already ok" \
  || { setup/manage-symlinks && echo "✅ set up"; }
"""

[tasks."setup:crontab"]
description = "Install crontab (shared + host-specific)"
run = """
# ...
host=$(bin/get-host 2>/dev/null)
combined=$(mktemp)
sed "s|\\$HOME|$HOME|g" crontab.txt > "$combined"
[[ -n "$host" && -f "crontab--${host}.txt" ]] && sed "s|\\$HOME|$HOME|g" "crontab--${host}.txt" >> "$combined"
crontab -l 2>/dev/null | diff -q - "$combined" >/dev/null \
  && echo "⏭️ already ok" \
  || { crontab "$combined" && echo "✅ installed"; }
rm -f "$combined"
"""

[tasks."install:brew"]
description = "Install brew packages"
run = """
# ...
host=$(bin/get-host 2>/dev/null)
brew bundle check --file setup/Brewfile.shared >/dev/null \
  && echo "⏭️ shared already ok" \
  || { echo "🔧 installing shared packages..." && brew bundle --file setup/Brewfile.shared && echo "✅ shared done"; }
[[ -n "$host" && -f "setup/Brewfile.$host" ]] && {
  brew bundle check --file setup/Brewfile.$host >/dev/null \
    && echo "⏭️ $host already ok" \
    || { echo "🔧 installing $host packages..." && brew bundle --file setup/Brewfile.$host && echo "✅ $host done"; }
}
rm -f .brew-outdated
true
"""

[tasks."setup:private-repo"]
description = "Clone or pull private dotfiles repo"
run = """
# ...
if test -d private/.git; then
  git -C private pull --quiet && echo "⏭️ private up to date"
else
  git clone git@github.com:katylava/dotkyl-private.git private && echo "✅ cloned"
fi
"""
[tasks."install:check-host"]
description = "Verify hostname is configured"
run = """
# ...
bin/get-host >/dev/null 2>&1 \
  || echo "👉 Add $(hostname) to bin/get-host and re-run mise run install"
"""

[tasks."sync:brew"]
description = "Remind if Brewfile changed since last brew install"
run = "mise-tasks/check-marker Brewfile brew"

[tasks."install:pip"]
description = "Install pip packages"
run = '''
# ...
missing=false
while read -r pkg; do
  [[ -z "$pkg" || "$pkg" == \#* ]] && continue
  mise exec python -- pip show "$pkg" >/dev/null 2>&1 || { missing=true; break; }
done < setup/Pipfile.shared
if [[ -n "$DOTKYL_HOST" && -f "setup/Pipfile.$DOTKYL_HOST" ]]; then
  while read -r pkg; do
    [[ -z "$pkg" || "$pkg" == \#* ]] && continue
    mise exec python -- pip show "$pkg" >/dev/null 2>&1 || { missing=true; break; }
  done < "setup/Pipfile.$DOTKYL_HOST"
fi
if $missing; then
  echo "🔧 installing pip packages..."
  mise exec python -- pip install -q -r setup/Pipfile.shared
  [[ -n "$DOTKYL_HOST" && -f "setup/Pipfile.$DOTKYL_HOST" ]] && \
    mise exec python -- pip install -q -r "setup/Pipfile.$DOTKYL_HOST"
  mise reshim
  echo "✅ done"
else
  echo "⏭️ already ok"
fi
rm -f .pip-outdated
'''

[tasks."sync:pip"]
description = "Remind if Pipfile changed since last pip install"
run = "mise-tasks/check-marker Pipfile pip"

[tasks."install:npm"]
description = "Install global npm packages"
run = '''
# ...
missing=false
while read -r pkg; do
  [[ -z "$pkg" || "$pkg" == \#* ]] && continue
  mise exec node -- npm ls -g --depth=0 "$pkg" >/dev/null 2>&1 || { missing=true; break; }
done < setup/NpmPackages.shared
if [[ -n "$DOTKYL_HOST" && -f "setup/NpmPackages.$DOTKYL_HOST" ]]; then
  while read -r pkg; do
    [[ -z "$pkg" || "$pkg" == \#* ]] && continue
    mise exec node -- npm ls -g --depth=0 "$pkg" >/dev/null 2>&1 || { missing=true; break; }
  done < "setup/NpmPackages.$DOTKYL_HOST"
fi
if $missing; then
  echo "🔧 installing npm packages..."
  pkgs=$(grep -vE '^\s*(#|$)' setup/NpmPackages.shared | tr '\n' ' ')
  mise exec node -- npm install -g --silent $pkgs
  if [[ -n "$DOTKYL_HOST" && -f "setup/NpmPackages.$DOTKYL_HOST" ]]; then
    pkgs=$(grep -vE '^\s*(#|$)' "setup/NpmPackages.$DOTKYL_HOST" | tr '\n' ' ')
    mise exec node -- npm install -g --silent $pkgs
  fi
  mise reshim
  echo "✅ done"
else
  echo "⏭️ already ok"
fi
rm -f .npm-outdated
'''

[tasks."install:claude-plugins"]
description = "Install Claude Code plugins from ClaudePlugins file"
run = '''
# ...
file="setup/ClaudePlugins.shared"
[[ -f "$file" ]] || exit 0
while read -r source plugin marketplace _; do
  [[ -z "$source" || "$source" == \#* ]] && continue
  spec="${plugin}@${marketplace}"
  if claude plugin marketplace list 2>/dev/null | ag "❯ ${marketplace}\$" >/dev/null; then
    echo "⏭️ marketplace ${marketplace} already added"
  else
    claude plugin marketplace add "$source" >/dev/null && echo "✅ marketplace ${marketplace} added"
  fi
  if claude plugin list 2>/dev/null | ag "${spec}" >/dev/null; then
    echo "⏭️ plugin ${spec} already installed"
  else
    claude plugin install "$spec" >/dev/null && echo "✅ plugin ${spec} installed"
  fi
done < "$file"
rm -f .claude-plugins-outdated
'''

[tasks."sync:claude-plugins"]
description = "Remind if ClaudePlugins.shared changed since last claude-plugins install"
run = "mise-tasks/check-marker ClaudePlugins.shared claude-plugins"

[tasks."sync:npm"]
description = "Remind if NpmPackages changed since last npm install"
run = "mise-tasks/check-marker NpmPackages npm"

[tasks.sync]
description = "Fast tasks (run by post-merge hook)"
depends = ["setup:**", "sync:**", "claude-settings-sync"]

[tasks.install]
description = "Full machine setup (run manually)"
depends = ["setup:**", "install:**"]
