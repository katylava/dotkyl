# configure --> https://starship.rs/config
# find nerdfont unicode points --> https://www.nerdfonts.com/cheat-sheet
# Óā∂ Óāī  Óā≤ Óāį

palette = "dark"
add_newline = true
command_timeout = 1_000
format = """
${custom.pwd}\
${custom.vim_mode}\
$python\
$nodejs\
$kubernetes\
${custom.etc_host}\
$jobs\
${custom.mail}\
${custom.left_end}\
$fill\
${custom.fun}\
$fill\
${custom.right_start}\
$status\
$cmd_duration\
$git_branch\
$git_status\
${custom.dotkyl_status}\
$time\
$line_break\
$character
"""

[character]
    success_symbol = " [‚Ěß](fg:green)"
    error_symbol = " [‚Ěß](fg:red)"
    vimcmd_symbol = " [ůįĶĶ](fg:bright-blue)"

[cmd_duration]
    disabled = false
    show_notifications = false
    style = "fg:red bg:alert"
    format = "[Óā≤](bg:separator fg:alert)[ $duration ]($style)[Óā≤](bg:alert fg:separator)"
    min_time = 1_000

[custom.dotkyl_status]
    description = "Warn when ~/.dotkyl/private has uncommitted, unpushed, or unpulled changes (invisible to the parent prompt since it's gitignored)"
    # ‚úĹ = uncommitted/untracked. `rev-list --left-right --count HEAD...@{u}` prints
    # "<ahead> <behind>" vs upstream ‚Üí ‚ÜĎ unpushed, ‚Üď behind (as of the last fetch).
    when = '''
p="$HOME/.dotkyl/private"
case "$PWD" in "$HOME/.dotkyl"*) ;; *) exit 1 ;; esac
[ -d "$p/.git" ] || exit 1  # prevent git error when bootstrapping repo
[ -n "$(git -C "$p" status --porcelain)" ] && exit 0
set -- $(git -C "$p" rev-list --left-right --count HEAD...@{u} 2>/dev/null)
{ [ "${1:-0}" -gt 0 ] || [ "${2:-0}" -gt 0 ]; } && exit 0
exit 1
'''
    command = '''
p="$HOME/.dotkyl/private"
out=""
[ -n "$(git -C "$p" status --porcelain)" ] && out="${out}‚úĹ"
set -- $(git -C "$p" rev-list --left-right --count HEAD...@{u} 2>/dev/null)
[ "${1:-0}" -gt 0 ] && out="${out}‚ÜĎ"
[ "${2:-0}" -gt 0 ] && out="${out}‚Üď"
echo "$out"
'''
    symbol = "ūüĒí"
    style = "bg:alert fg:black"
    format = "[](bg:separator fg:alert)[ $symbol $output ]($style)[](bg:alert fg:separator)"

[custom.etc_host]
    description = "Shows if oreilly.[com|review] is in /etc/hosts"
    command = 'grep -vE "^[^#]*vpn\.corp" /etc/hosts | grep -oE "oreilly\.(com|review)" | uniq | sed s/\n//g | sed s/oreilly//g'
    when = 'grep -vE "^[^#]*vpn\.corp" /etc/hosts | grep -qE "oreilly\.(com|review)"'
    symbol = "ůįĺč"
    style = "bg:note fg:bright-white"
    format = "[Óāį](bg:note fg:separator)[ $symbol $output ]($style)[Óāį](bg:separator fg:note)"

[custom.fun]
    description = "A fun seasonal symbol"
    # command = "echo $(jot -b 'ūü¶Ü' -s '' $(jot -r 1 1 5))" # random numebr of ducks
    command = "echo ūü¶Ü $(jot -b '-' -s '' $(jot -r 1 1 20))" # moving duck (moves left only)
    style = "bg:frame fg:frame"
    format = "[$output]($style)"
    when = true

[custom.left_end]
    description = "End of the left side of the prompt"
    style = "bg:frame"
    format = "[Óāį](bg:frame fg:separator)"
    when = true

[custom.mail]
    symbol = "ūüďß"
    description = "Shows a mail icon if there is any mail, otherwise nothing."
    when = "mail -e"
    style = "bg:note"
    format = "[Óāį](bg:note fg:separator)[ $symbol$number ]($style)[Óāį](bg:separator fg:note)"

[custom.pwd]
    # from env var set in precmd_functions in 090-prompt.zsh
    command = "echo $MYPWD"
    description = "Shows current directory's bookmark if there is one, otherwise a middle-truncated path to the current directory."
    when = true
    format = "[Óā∂](fg:frame)[$output ](fg:black bg:frame)[Óāį](bg:separator fg:frame)"

[custom.right_start]
    description = "Start of the right side of the prompt"
    style = "bg:frame"
    format = "[Óā≤](bg:frame fg:separator)"
    when = true

[custom.vim_mode]
    # from env var set 020-keybindings.zsh
    command = "echo $VIM_MODE"
    description = "Shows the current mode for zsh vi mode."
    style = "bg:alert fg:black"
    when = ''' test "$VIM_MODE" = "NORM" '''
    format = "[Óāį](bg:alert fg:separator)[ $output ]($style)[Óāį](bg:separator fg:alert)"

[fill]
    symbol = " "
    style = "bg:frame"

[git_branch]
    disabled = false
    style = "bg:lang fg:black"
    format = "[Óā≤](bg:separator fg:lang)[ $symbol$branch(:$remote_branch) ]($style)[Óā≤](bg:lang fg:separator)"

[git_status]
    disabled = false
    style = "bold bg:ctx fg:ctx_fg"
    format = '[Óā≤](bg:separator fg:ctx)[ $all_status$ahead_behind ]($style)[Óā≤](bg:ctx fg:separator)'
    ahead = "${count}‚ÜĎ"
    behind = "${count}‚Üď"
    diverged = "${ahead_count}‚áÖ ${behind_count}"
    untracked = "Šćß "
    up_to_date = "‚úď"
    stashed = "Šõč "
    modified = "‚úĹ "
    staged = "‚úö "
    renamed = "‚•Ī "
    deleted = "‚úó "

[jobs]
    style = "bg:alert fg:red"
    format = "[Óāį](bg:alert fg:separator)[ $symbol$number ]($style)[Óāį](bg:separator fg:alert)"

[kubernetes]
    disabled = false
    detect_files = ["env.local"]
    symbol = "‚éą "
    style = "bold bg:ctx fg:ctx_fg"
    format = '[Óāį](bg:ctx fg:separator)[ $symbol$context(:$namespace) ]($style)[Óāį](bg:separator fg:ctx)'

[nodejs]
    symbol = "\ue781 "
    style = "bg:lang fg:black"
    not_capable_style = "bg:lang fg:red"
    format = "[Óāį](bg:lang fg:separator)[ $symbol($version) ]($style)[Óāį](bg:separator fg:lang)"
    version_format = "${raw}"

[python]
    symbol = "\ue606 "
    style = "fg:black bg:lang"
    format = '[Óāį](bg:lang fg:separator)[ ${symbol}(${version})([ $virtualenv](fg:red bg:lang)) ]($style)[Óāį](bg:separator fg:lang)'
    version_format = "${raw}"

[status]
    disabled = false
    style = "bg:err fg:bright-white"
    format = "[Óā≤](bg:separator fg:err)[ $symbol $status ]($style)[Óā≤](bg:err fg:separator)"

[time]
    disabled = false
    style = "bg:frame fg:black"
    format = "[Óā≤](bg:separator fg:frame)[ $time ]($style)[Óāī](fg:frame)"

[palettes.dark]
separator = "#444444"
frame = "cyan"
lang = "green"
ctx = "purple"
alert = "yellow"
note = "blue"
err = "red"
ctx_fg = "green"

[palettes.light]
separator = "#c8c8c8"
frame = "bright-cyan"
lang = "bright-green"
ctx = "bright-purple"
alert = "bright-yellow"
note = "bright-blue"
err = "bright-red"
ctx_fg = "white"
