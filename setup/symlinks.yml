- source_glob: home/*
  target_dir: "~"
  prefix: .
  excludes: [config, claude]

- source_glob: home/claude/*
  target_dir: ~/.claude
  excludes: [skills]

- source_glob: home/claude/skills/*
  target_dir: ~/.claude/skills

- source_glob: home/config/*
  target_dir: ~/.config

- source_glob: nvim
  target_dir: ~/.config

- source_glob: iterm/*.json
  target_dir: ~/Library/Application Support/iTerm2/DynamicProfiles
